[alembic]
script_location = migration
# default only -- migration/env.py overrides this with DATABASE_URL from .env
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/nicechat

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
